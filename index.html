<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Tarjeta Digital</title>
  <style>
    @font-face {
      font-family: 'Outfit';
      font-style: normal;
      font-weight: 400;
      font-display: swap;
      src: local('Outfit'), local('Segoe UI'), local('system-ui');
    }
    @font-face {
      font-family: 'Outfit';
      font-style: normal;
      font-weight: 500;
      font-display: swap;
      src: local('Outfit Medium'), local('Segoe UI Semibold'), local('system-ui');
    }
    @font-face {
      font-family: 'Outfit';
      font-style: normal;
      font-weight: 600;
      font-display: swap;
      src: local('Outfit SemiBold'), local('Segoe UI Semibold'), local('system-ui');
    }
    @font-face {
      font-family: 'Outfit';
      font-style: normal;
      font-weight: 700;
      font-display: swap;
      src: local('Outfit Bold'), local('Segoe UI Bold'), local('system-ui');
    }

    :root {
      --md-sys-color-primary: #1C4B5E;
      --md-sys-color-on-primary: #FFFFFF;
      --md-sys-color-secondary: #4A636D;
      --md-sys-color-surface: #FAFDFD;
      font-family: 'Outfit', 'Segoe UI', system-ui, -apple-system, sans-serif;
      --md-sys-color-surface-variant: #DBE4E6;
      --md-sys-color-on-surface: #191C1D;
      --md-sys-color-on-surface-variant: #3F484A;
      --md-sys-color-outline: #6F797A;
      --md-sys-color-error: #BA1A1A;
      --shadow-card: 0 4px 24px rgba(0,0,0,0.08);
      --shadow-elevated: 0 8px 32px rgba(0,0,0,0.12);
      --radius-card: 16px;
      --radius-btn: 12px;
      --transition: 200ms ease-out;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--md-sys-color-surface);
      color: var(--md-sys-color-on-surface);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
      padding-bottom: max(24px, env(safe-area-inset-bottom));
    }

    .app-header {
      width: 100%;
      max-width: 420px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .app-title {
      font-size: 20px;
      font-weight: 600;
      color: var(--md-sys-color-primary);
    }

    .mode-toggle {
      display: flex;
      background: var(--md-sys-color-surface-variant);
      border-radius: 20px;
      padding: 4px;
    }

    .mode-btn {
      padding: 8px 16px;
      border: none;
      background: transparent;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      color: var(--md-sys-color-on-surface-variant);
      border-radius: 16px;
      cursor: pointer;
      transition: var(--transition);
    }

    .mode-btn.active {
      background: var(--md-sys-color-primary);
      color: var(--md-sys-color-on-primary);
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: var(--md-sys-color-surface);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-card);
      overflow: hidden;
    }

    .card-preview {
      position: relative;
      height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: visible;
    }

    .card-preview::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0.85;
    }

    .bg-lunar { 
      background: linear-gradient(135deg, #0D1B2A 0%, #1B263B 50%, #0D1B2A 100%);
      position: relative;
    }
    .bg-lunar::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 30% 20%, rgba(100, 150, 200, 0.1) 0%, transparent 50%),
                  radial-gradient(circle at 70% 80%, rgba(100, 150, 200, 0.08) 0%, transparent 40%);
    }
    .bg-sunset { 
      background: linear-gradient(160deg, #2D1B2E 0%, #4A1942 40%, #662D4B 100%);
      position: relative;
    }
    .bg-sunset::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 80% 10%, rgba(255, 120, 150, 0.15) 0%, transparent 50%);
    }
    .bg-forest { 
      background: linear-gradient(145deg, #1A2F1A 0%, #2D4A2D 50%, #1A2F1A 100%);
      position: relative;
    }
    .bg-forest::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 20% 70%, rgba(100, 180, 100, 0.1) 0%, transparent 40%);
    }
    .bg-ocean { 
      background: linear-gradient(135deg, #0A192F 0%, #193853 50%, #0A192F 100%);
      position: relative;
    }
    .bg-ocean::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 0%, rgba(30, 80, 120, 0.2) 100%);
    }
    .bg-rose { 
      background: linear-gradient(150deg, #2D2225 0%, #4A383D 50%, #2D2225 100%);
      position: relative;
    }
    .bg-rose::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 60% 30%, rgba(200, 120, 140, 0.12) 0%, transparent 40%);
    }
    .bg-slate { 
      background: linear-gradient(140deg, #1E2D2F 0%, #3D5456 50%, #1E2D2F 100%);
      position: relative;
    }
    .bg-slate::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 40% 60%, rgba(150, 180, 180, 0.08) 0%, transparent 40%);
    }
    .bg-sand { 
      background: linear-gradient(135deg, #2D2720 0%, #4A4035 60%, #2D2720 100%);
      position: relative;
    }
    .bg-sand::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 30% 80%, rgba(180, 160, 120, 0.1) 0%, transparent 40%);
    }
    .bg-lavender { 
      background: linear-gradient(160deg, #E6E6FA 0%, #D8BFD8 50%, #DDA0DD 100%);
      position: relative;
    }
    .bg-lavender::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 70% 20%, rgba(200, 150, 200, 0.2) 0%, transparent 50%);
    }
    .bg-peach { 
      background: linear-gradient(160deg, #FFDAB9 0%, #FFB6A1 50%, #FFCBA4 100%);
      position: relative;
    }
    .bg-peach::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 30% 30%, rgba(255, 200, 150, 0.25) 0%, transparent 50%);
    }
    .bg-coral { 
      background: linear-gradient(150deg, #F88379 0%, #F4A582 50%, #E97D6F 100%);
      position: relative;
    }
    .bg-coral::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 80% 20%, rgba(255, 180, 150, 0.25) 0%, transparent 50%);
    }
    .bg-blush { 
      background: linear-gradient(155deg, #FDE2E4 0%, #FAD0C4 50%, #E8B4B8 100%);
      position: relative;
    }
    .bg-blush::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 30%, rgba(255, 200, 200, 0.2) 0%, transparent 50%);
    }
    .bg-mauve { 
      background: linear-gradient(150deg, #E0B0FF 0%, #BFA0D0 50%, #A88FBF 100%);
      position: relative;
    }
    .bg-mauve::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 60% 30%, rgba(200, 150, 220, 0.2) 0%, transparent 50%);
    }
    .bg-cream { 
      background: linear-gradient(180deg, #FFF8E7 0%, #FFF5DC 50%, #F5E6C8 100%);
      position: relative;
    }
    .bg-cream::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 20%, rgba(255, 240, 200, 0.3) 0%, transparent 50%);
    }
    .bg-white { background: linear-gradient(180deg, #FAFAFA 0%, #FFFFFF 50%, #F5F5F5 100%); }

    .card.bg-img1 {
      background: linear-gradient(180deg, rgba(255,255,255,0.85), rgba(255,255,255,0.85)), url(img/1\ \(1\).jpg);
      background-size: cover;
      background-position: center;
      position: relative;
    }
    .card.bg-img2 {
      background: linear-gradient(180deg, rgba(255,255,255,0.85), rgba(255,255,255,0.85)), url(img/1\ \(2\).jpg);
      background-size: cover;
      background-position: center;
      position: relative;
    }
    .card.bg-img3 {
      background: linear-gradient(180deg, rgba(255,255,255,0.85), rgba(255,255,255,0.85)), url(img/1\ \(3\).jpg);
      background-size: cover;
      background-position: center;
      position: relative;
    }
    .card.bg-img1::before, .card.bg-img2::before, .card.bg-img3::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, 0.15);
      pointer-events: none;
    }

    .card-content {
      position: relative;
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .photo-container {
      position: absolute;
      top: 50%;
      left: 20px;
      transform: translateY(-50%);
      z-index: 10;
    }

    .preview-info {
      position: absolute;
      top: 50%;
      left: 140px;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .preview-info .contact-name {
      margin-top: 0;
      font-size: 16px;
    }

    .preview-info .contact-company {
      font-size: 10px;
    }

    .preview-info .contact-title {
      font-size: 10px;
    }

    .photo {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 3px solid var(--md-sys-color-primary);
      object-fit: cover;
      background: var(--md-sys-color-surface-variant);
    }

    .photo-placeholder {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 3px solid var(--md-sys-color-primary);
      background: var(--md-sys-color-surface-variant);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .photo-placeholder svg {
      width: 48px;
      height: 48px;
      color: var(--md-sys-color-outline);
    }

    .contact-name {
      font-size: 18px;
      font-weight: 500;
      text-align: center;
      margin-top: 30px;
      color: rgba(255, 255, 255, 0.95);
      letter-spacing: 0.5px;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
    }

    .contact-company {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.7);
      letter-spacing: 1px;
      text-transform: uppercase;
      font-weight: 400;
    }

    .contact-title {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.6);
      font-weight: 300;
    }

    .contact-presentation {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.8);
      text-align: left;
      margin-top: 4px;
      max-width: 180px;
    }

    .bg-white .contact-name { color: #1a1a1a; text-shadow: none; }
    .bg-white .contact-company { color: #666; }
    .bg-white .contact-title { color: #888; }
    .bg-white .contact-presentation { color: #444; }

    .bg-cream .contact-name { color: #1a1a1a; text-shadow: none; }
    .bg-cream .contact-company { color: #666; }
    .bg-cream .contact-title { color: #888; }
    .bg-cream .contact-presentation { color: #444; }

    .card.bg-img1 .contact-name, .card.bg-img2 .contact-name, .card.bg-img3 .contact-name { color: #1C4B5E; text-shadow: none; }
    .card.bg-img1 .contact-company, .card.bg-img2 .contact-company, .card.bg-img3 .contact-company { color: #1C4B5E; opacity: 0.7; }
    .card.bg-img1 .contact-title, .card.bg-img2 .contact-title, .card.bg-img3 .contact-title { color: #1C4B5E; opacity: 0.6; }
    .card.bg-img1 .contact-presentation, .card.bg-img2 .contact-presentation, .card.bg-img3 .contact-presentation { color: #1C4B5E; }

    .contact-info {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px;
      background: var(--md-sys-color-surface-variant);
      border-radius: var(--radius-btn);
      text-decoration: none;
      color: var(--md-sys-color-on-surface);
      transition: var(--transition);
    }

    .contact-item:hover {
      background: var(--md-sys-color-outline);
      color: var(--md-sys-color-on-primary);
    }

    .contact-item svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    .contact-item span {
      font-size: 14px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .social-links {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .social-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      background: var(--md-sys-color-surface-variant);
      color: var(--md-sys-color-on-surface);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
      text-decoration: none;
    }

    .social-btn:hover {
      background: var(--md-sys-color-primary);
      color: var(--md-sys-color-on-primary);
    }

    .social-btn svg {
      width: 18px;
      height: 18px;
    }

    .action-buttons {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: var(--radius-btn);
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: var(--transition);
    }

    .btn-primary {
      background: var(--md-sys-color-primary);
      color: var(--md-sys-color-on-primary);
    }

    .btn-primary:hover {
      background: var(--md-sys-color-secondary);
    }

    .btn-secondary {
      background: var(--md-sys-color-surface-variant);
      color: var(--md-sys-color-on-surface);
    }

    .btn-secondary:hover {
      background: var(--md-sys-color-outline);
      color: var(--md-sys-color-on-primary);
    }

    .btn svg {
      width: 18px;
      height: 18px;
    }

    .edit-form {
      display: none;
      padding: 24px;
      flex-direction: column;
      gap: 16px;
      background: var(--md-sys-color-surface);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-card);
      position: relative;
    }

    .edit-form.active {
      display: flex;
    }

    .edit-form.bg-img1, .edit-form.bg-img2, .edit-form.bg-img3 { background-color: transparent; }
    .edit-form.bg-img1 { background: linear-gradient(180deg, rgba(255,255,255,0.85), rgba(255,255,255,0.85)), url(img/1\ \(1\).jpg); background-size: cover; background-position: center; }
    .edit-form.bg-img2 { background: linear-gradient(180deg, rgba(255,255,255,0.85), rgba(255,255,255,0.85)), url(img/1\ \(2\).jpg); background-size: cover; background-position: center; }
    .edit-form.bg-img3 { background: linear-gradient(180deg, rgba(255,255,255,0.85), rgba(255,255,255,0.85)), url(img/1\ \(3\).jpg); background-size: cover; background-position: center; }
    .edit-form.bg-img1::before, .edit-form.bg-img2::before, .edit-form.bg-img3::before { content:''; position:absolute; inset:0; background:rgba(255,255,255,0.15); pointer-events:none; }

    .edit-form.bg-img1 *, .edit-form.bg-img2 *, .edit-form.bg-img3 * { color: #1C4B5E; }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--md-sys-color-on-surface-variant);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-input {
      padding: 14px 16px;
      border: 1px solid var(--md-sys-color-outline);
      border-radius: var(--radius-btn);
      font-family: inherit;
      font-size: 14px;
      background: var(--md-sys-color-surface);
      color: var(--md-sys-color-on-surface);
      transition: var(--transition);
    }

    .form-input:focus {
      outline: none;
      border-color: var(--md-sys-color-primary);
    }

    .bg-picker {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .bg-option {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 8px;
      border: 2px solid transparent;
      cursor: pointer;
      transition: var(--transition);
    }

    .bg-option.selected {
      border-color: var(--md-sys-color-primary);
      box-shadow: 0 0 0 3px var(--md-sys-color-primary), 0 0 12px rgba(28, 75, 94, 0.5);
    }

    .photo-upload {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .photo-preview {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      background: var(--md-sys-color-surface-variant);
    }

    .photo-input {
      display: none;
    }

    .photo-label {
      padding: 10px 20px;
      background: var(--md-sys-color-surface-variant);
      border-radius: var(--radius-btn);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
    }

    .photo-label:hover {
      background: var(--md-sys-color-outline);
      color: var(--md-sys-color-on-primary);
    }

    .qr-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .qr-modal.active {
      display: flex;
    }

    .qr-content {
      background: var(--md-sys-color-surface);
      border-radius: var(--radius-card);
      padding: 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      max-width: 340px;
      width: 100%;
    }

    .qr-title {
      font-size: 18px;
      font-weight: 600;
    }

    #qr-code {
      background: white;
      padding: 16px;
      border-radius: 8px;
    }

    #qr-code canvas {
      display: block;
    }

    .qr-close {
      padding: 12px 32px;
      background: var(--md-sys-color-primary);
      color: var(--md-sys-color-on-primary);
      border: none;
      border-radius: var(--radius-btn);
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }

    .card-display {
      display: none;
    }

    .card-display.active {
      display: block;
    }

    .empty-state {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      gap: 16px;
      text-align: center;
    }

    .empty-state.active {
      display: flex;
    }

    .empty-icon {
      width: 64px;
      height: 64px;
      color: var(--md-sys-color-outline);
    }

    .empty-text {
      font-size: 16px;
      color: var(--md-sys-color-on-surface-variant);
    }

    .hidden {
      display: none !important;
    }

    @media (min-width: 420px) {
      body {
        padding: 48px 24px;
      }
    }
  </style>
  <script src="js/qrcode.min.js"></script>
</head>
<body>
  <header class="app-header">
    <h1 class="app-title">Tarjeta Digital</h1>
    <div class="mode-toggle">
      <button class="mode-btn active" data-mode="view">Ver</button>
      <button class="mode-btn" data-mode="edit">Editar</button>
    </div>
  </header>

  <main class="card" id="card">
    <div class="empty-state" id="empty-state">
      <svg class="empty-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
      </svg>
      <p class="empty-text">Crea tu tarjeta digital</p>
      <button class="btn btn-primary" id="create-card-btn">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
        </svg>
        Crear Tarjeta
      </button>
    </div>

    <div class="card-display" id="card-display">
      <div class="card-preview" id="card-preview">
        <div class="photo-container">
          <div class="photo-placeholder" id="photo-placeholder">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
            </svg>
          </div>
          <img class="photo" id="card-photo" src="" alt="Foto" style="display: none;">
        </div>
        <div class="preview-info">
          <h2 class="contact-name" id="card-name">Nombre</h2>
          <p class="contact-company" id="card-company">Empresa</p>
          <p class="contact-title" id="card-title">Título</p>
          <p class="contact-presentation" id="card-presentation" style="display:none;"></p>
        </div>
      </div>
      <div class="card-content">
        <div class="contact-info" id="contact-info">
        </div>

        <div class="social-links" id="social-links">
        </div>

        <div class="action-buttons">
          <button class="btn btn-primary" id="save-contact-btn">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">

    function init() {
      loadData();
      setupEventListeners();
      render();
    }

    function loadData() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        try {
          cardData = { ...cardData, ...JSON.parse(saved) };
        } catch (e) {}
      }
    }

    function saveData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(cardData));
    }

    function setupEventListeners() {
      document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.addEventListener('click', () => switchMode(btn.dataset.mode));
      });

      document.getElementById('create-card-btn').addEventListener('click', () => switchMode('edit'));
      document.getElementById('cancel-edit-btn').addEventListener('click', () => {
        if (cardData.name) switchMode('view');
        else switchMode('edit');
      });

      document.querySelectorAll('.bg-option').forEach(opt => {
        opt.addEventListener('click', () => {
          document.querySelectorAll('.bg-option').forEach(o => o.classList.remove('selected'));
          opt.classList.add('selected');
          cardData.background = opt.dataset.bg;
          
          const form = document.getElementById('edit-form');
          form.classList.remove('bg-img1', 'bg-img2', 'bg-img3');
          if (isImageBackground(cardData.background)) {
            form.classList.add('bg-' + cardData.background);
          }
        });
      });

      document.getElementById('photo-input').addEventListener('change', handlePhotoUpload);

      document.getElementById('edit-form').addEventListener('submit', handleSave);
      document.getElementById('save-btn').addEventListener('click', handleSave);

      document.getElementById('save-contact-btn').addEventListener('click', downloadVCard);
      document.getElementById('show-qr-btn').addEventListener('click', showQR);
      document.getElementById('preview-html-btn').addEventListener('click', previewAsHTML);
      document.getElementById('share-html-btn').addEventListener('click', shareAsHTML);
      document.getElementById('qr-close').addEventListener('click', () => {
        document.getElementById('qr-modal').classList.remove('active');
      });
      document.getElementById('qr-modal').addEventListener('click', (e) => {
        if (e.target === document.getElementById('qr-modal')) {
          document.getElementById('qr-modal').classList.remove('active');
        }
      });
    }

    function switchMode(mode) {
      document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.mode === mode);
      });

      const display = document.getElementById('card-display');
      const form = document.getElementById('edit-form');
      const empty = document.getElementById('empty-state');

      if (mode === 'edit') {
        display.classList.remove('active');
        form.classList.add('active');
        
        if (isImageBackground(cardData.background)) {
          form.classList.add('bg-' + cardData.background);
        } else {
          form.classList.remove('bg-img1', 'bg-img2', 'bg-img3');
        }
        
        empty.classList.remove('active');
        populateForm();
      } else {
        if (cardData.name) {
          form.classList.remove('active');
          display.classList.add('active');
          empty.classList.remove('active');
          renderCard();
        } else {
          form.classList.remove('active');
          display.classList.remove('active');
          empty.classList.add('active');
        }
      }
    }

    function populateForm() {
      document.getElementById('input-name').value = cardData.name || '';
      document.getElementById('input-title').value = cardData.title || '';
      document.getElementById('input-phone').value = cardData.phone || '';
      document.getElementById('input-description').value = cardData.description || '';
      document.getElementById('input-address').value = cardData.address || '';
      document.getElementById('input-email').value = cardData.email || '';
      document.getElementById('input-website').value = cardData.website || '';
      document.getElementById('input-company').value = cardData.company || '';
      document.getElementById('input-whatsapp').value = cardData.whatsapp || '';
      document.getElementById('input-instagram').value = cardData.instagram || '';
      document.getElementById('input-linkedin').value = cardData.linkedin || '';
      document.getElementById('input-twitter').value = cardData.twitter || '';
      document.getElementById('input-youtube').value = cardData.youtube || '';
      document.getElementById('input-github').value = cardData.github || '';
      document.getElementById('input-telegram').value = cardData.telegram || '';

      document.querySelectorAll('.bg-option').forEach(opt => {
        opt.classList.toggle('selected', opt.dataset.bg === cardData.background);
      });

      const photoPreview = document.getElementById('photo-preview');
      if (cardData.photo) {
        photoPreview.src = cardData.photo;
        photoPreview.style.display = 'block';
      } else {
        photoPreview.style.display = 'none';
      }
    }

    function handlePhotoUpload(e) {
      const file = e.target.files[0];
      if (!file) return;

      if (file.size > 500 * 1024) {
        alert('La foto debe ser menor a 500KB');
        return;
      }

      const reader = new FileReader();
      reader.onload = (ev) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          const maxSize = 200;
          let size = Math.min(img.width, img.height);
          const x = (img.width - size) / 2;
          const y = (img.height - size) / 2;

          canvas.width = maxSize;
          canvas.height = maxSize;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, x, y, size, size, 0, 0, maxSize, maxSize);

          cardData.photo = canvas.toDataURL('image/jpeg', 0.7);
          const preview = document.getElementById('photo-preview');
          preview.src = cardData.photo;
          preview.style.display = 'block';
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    }

    function handleSave(e) {
      e.preventDefault();

      const name = document.getElementById('input-name').value.trim();
      if (!name) {
        alert('Por favor ingresa tu nombre');
        return;
      }

      cardData.name = name;
      cardData.title = document.getElementById('input-title').value.trim();
      cardData.phone = document.getElementById('input-phone').value.trim();
      cardData.description = document.getElementById('input-description').value.trim();
      cardData.address = document.getElementById('input-address').value.trim();
      cardData.email = document.getElementById('input-email').value.trim();
      cardData.website = document.getElementById('input-website').value.trim();
      cardData.company = document.getElementById('input-company').value.trim();
      cardData.background = document.querySelector('.bg-option.selected')?.dataset.bg || 'lunar';
      cardData.whatsapp = document.getElementById('input-whatsapp').value.trim();
      cardData.instagram = document.getElementById('input-instagram').value.trim();
      cardData.linkedin = document.getElementById('input-linkedin').value.trim();
      cardData.twitter = document.getElementById('input-twitter').value.trim();
      cardData.youtube = document.getElementById('input-youtube').value.trim();
      cardData.github = document.getElementById('input-github').value.trim();
      cardData.telegram = document.getElementById('input-telegram').value.trim();

      saveData();
      switchMode('view');
      renderCard();
    }

    function render() {
      if (cardData.name) {
        switchMode('view');
      } else {
        switchMode('edit');
      }
    }

    function renderCard() {
      const card = document.getElementById('card');
      const preview = document.getElementById('card-preview');
      preview.className = 'card-preview bg-' + cardData.background;
      
      if (isImageBackground(cardData.background)) {
        card.className = 'card bg-' + cardData.background;
        preview.className = 'card-preview';
        preview.style = '';
      } else {
        card.className = 'card';
        card.style = '';
      }

      const photo = document.getElementById('card-photo');
      const placeholder = document.getElementById('photo-placeholder');
      if (cardData.photo) {
        photo.src = cardData.photo;
        photo.style.display = 'block';
        placeholder.style.display = 'none';
      } else {
        photo.style.display = 'none';
        placeholder.style.display = 'flex';
      }

      document.getElementById('card-name').textContent = cardData.name;
      document.getElementById('card-company').textContent = cardData.company || '';
      document.getElementById('card-title').textContent = cardData.title || '';

      }
      if (cardData.email) {
        contactInfo.innerHTML += `<a href="mailto:${cardData.email}" class="contact-item">${icons.email}<span>${cardData.email}</span></a>`;
      }
      if (cardData.website) {
        contactInfo.innerHTML += `<a href="${cardData.website}" target="_blank" class="contact-item">${icons.website}<span>${cardData.website.replace(/^https?:\/\//, '')}</span></a>`;
      }
      if (cardData.address) {
        contactInfo.innerHTML += `<a href="#" class="contact-item" onclick="return false;">${icons.address}<span>${cardData.address}</span></a>`;

        { key: 'github', icon: icons.github },

      socials.forEach(s => {
        if (cardData[s.key]) {
          socialLinks.innerHTML += `<a href="${cardData[s.key]}" target="_blank" class="social-btn" title="${s.key}">${s.icon}</a>`;

    function generateVCard() {
      let vcard = 'BEGIN:VCARD\nVERSION:3.0\n';
      vcard += `FN:${cardData.name}\n`;
      if (cardData.title) vcard += `TITLE:${cardData.title}\n`;
      if (cardData.company) vcard += `ORG:${cardData.company}\n`;
      if (cardData.phone) vcard += `TEL:${cardData.phone}\n`;
      if (cardData.description) vcard += `NOTE:${cardData.description}\n`;
      if (cardData.address) vcard += `ADR:;;${cardData.address};;;;\n`;
      if (cardData.email) vcard += `EMAIL:${cardData.email}\n`;
      if (cardData.website) vcard += `URL:${cardData.website}\n`;
      if (cardData.whatsapp) vcard += `URL;type=WhatsApp:${cardData.whatsapp}\n`;
      if (cardData.instagram) vcard += `URL;type=Instagram:${cardData.instagram}\n`;
      if (cardData.linkedin) vcard += `URL;type=LinkedIn:${cardData.linkedin}\n`;
      if (cardData.twitter) vcard += `URL;type=Twitter:${cardData.twitter}\n`;
      if (cardData.youtube) vcard += `URL;type=YouTube:${cardData.youtube}\n`;
      if (cardData.github) vcard += `URL;type=GitHub:${cardData.github}\n`;
      if (cardData.telegram) vcard += `URL;type=Telegram:${cardData.telegram}\n`;
      vcard += 'END:VCARD';
      return vcard;
    }

    function downloadVCard() {
      const vcard = generateVCard();
      const blob = new Blob([vcard], { type: 'text/vcard' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `${cardData.name.replace(/\s+/g, '_')}.vcf`;
      a.click();
      URL.revokeObjectURL(url);
    }

    function generateQRBase64(callback) {
      const vcard = generateVCard();
      if (!window.QRCode) {
        console.error('QRCode no cargado');
        callback('');
        return;
      }
      QRCode.toDataURL(vcard, { width: 200, margin: 1 }, (err, dataUrl) => {
        if (err) {
          console.error(err);
          callback('');
          return;
        }
        callback(dataUrl);
      });
    }

    function showQR() {
      const qrContainer = document.getElementById('qr-code');
      qrContainer.innerHTML = '';

      if (!window.QRCode) {
        console.error('QRCode no cargado');
        return;
      }

      const vcard = generateVCard();
      QRCode.toCanvas(vcard, { width: 200, margin: 1 }, (err, canvas) => {
        if (err) {
          console.error(err);
          return;
        }
        qrContainer.appendChild(canvas);
      });

      document.getElementById('qr-modal').classList.add('active');
    }
