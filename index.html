<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Tarjeta Digital</title>
  <style>
    @font-face {
      font-family: 'Outfit';
      font-style: normal;
      font-weight: 400;
      font-display: swap;
      src: local('Outfit'), local('Segoe UI'), local('system-ui');
    }
    @font-face {
      font-family: 'Outfit';
      font-style: normal;
      font-weight: 500;
      font-display: swap;
      src: local('Outfit Medium'), local('Segoe UI Semibold'), local('system-ui');
    }
    @font-face {
      font-family: 'Outfit';
      font-style: normal;
      font-weight: 600;
      font-display: swap;
      src: local('Outfit SemiBold'), local('Segoe UI Semibold'), local('system-ui');
    }
    @font-face {
      font-family: 'Outfit';
      font-style: normal;
      font-weight: 700;
      font-display: swap;
      src: local('Outfit Bold'), local('Segoe UI Bold'), local('system-ui');
    }

    :root {
      --md-sys-color-primary: #1C4B5E;
      --md-sys-color-on-primary: #FFFFFF;
      --md-sys-color-secondary: #4A636D;
      --md-sys-color-surface: #FAFDFD;
      font-family: 'Outfit', 'Segoe UI', system-ui, -apple-system, sans-serif;
      --md-sys-color-surface-variant: #DBE4E6;
      --md-sys-color-on-surface: #191C1D;
      --md-sys-color-on-surface-variant: #3F484A;
      --md-sys-color-outline: #6F797A;
      --md-sys-color-error: #BA1A1A;
      --shadow-card: 0 4px 24px rgba(0,0,0,0.08);
      --shadow-elevated: 0 8px 32px rgba(0,0,0,0.12);
      --radius-card: 16px;
      --radius-btn: 12px;
      --transition: 200ms ease-out;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--md-sys-color-surface);
      color: var(--md-sys-color-on-surface);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
      padding-bottom: max(24px, env(safe-area-inset-bottom));
    }

    .app-header {
      width: 100%;
      max-width: 420px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .app-title {
      font-size: 20px;
      font-weight: 600;
      color: var(--md-sys-color-primary);
    }

    .mode-toggle {
      display: flex;
      background: var(--md-sys-color-surface-variant);
      border-radius: 20px;
      padding: 4px;
    }

    .mode-btn {
      padding: 8px 16px;
      border: none;
      background: transparent;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      color: var(--md-sys-color-on-surface-variant);
      border-radius: 16px;
      cursor: pointer;
      transition: var(--transition);
    }

    .mode-btn.active {
      background: var(--md-sys-color-primary);
      color: var(--md-sys-color-on-primary);
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: var(--md-sys-color-surface);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-card);
      overflow: hidden;
    }

    .card-preview {
      position: relative;
      height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: visible;
    }

    .card-preview::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0.85;
    }

    .bg-lunar { 
      background: linear-gradient(135deg, #0D1B2A 0%, #1B263B 50%, #0D1B2A 100%);
      position: relative;
    }
    .bg-lunar::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 30% 20%, rgba(100, 150, 200, 0.1) 0%, transparent 50%),
                  radial-gradient(circle at 70% 80%, rgba(100, 150, 200, 0.08) 0%, transparent 40%);
    }
    .bg-sunset { 
      background: linear-gradient(160deg, #2D1B2E 0%, #4A1942 40%, #662D4B 100%);
      position: relative;
    }
    .bg-sunset::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 80% 10%, rgba(255, 120, 150, 0.15) 0%, transparent 50%);
    }
    .bg-forest { 
      background: linear-gradient(145deg, #1A2F1A 0%, #2D4A2D 50%, #1A2F1A 100%);
      position: relative;
    }
    .bg-forest::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 20% 70%, rgba(100, 180, 100, 0.1) 0%, transparent 40%);
    }
    .bg-ocean { 
      background: linear-gradient(135deg, #0A192F 0%, #193853 50%, #0A192F 100%);
      position: relative;
    }
    .bg-ocean::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 0%, rgba(30, 80, 120, 0.2) 100%);
    }
    .bg-rose { 
      background: linear-gradient(150deg, #2D2225 0%, #4A383D 50%, #2D2225 100%);
      position: relative;
    }
    .bg-rose::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 60% 30%, rgba(200, 120, 140, 0.12) 0%, transparent 40%);
    }
    .bg-slate { 
      background: linear-gradient(140deg, #1E2D2F 0%, #3D5456 50%, #1E2D2F 100%);
      position: relative;
    }
    .bg-slate::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 40% 60%, rgba(150, 180, 180, 0.08) 0%, transparent 40%);
    }
    .bg-sand { 
      background: linear-gradient(135deg, #2D2720 0%, #4A4035 60%, #2D2720 100%);
      position: relative;
    }
    .bg-sand::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 30% 80%, rgba(180, 160, 120, 0.1) 0%, transparent 40%);
    }
    .bg-white { background: linear-gradient(180deg, #FAFAFA 0%, #FFFFFF 50%, #F5F5F5 100%); }

    .card-content {
      position: relative;
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .photo-container {
      position: absolute;
      top: 50%;
      left: 20px;
      transform: translateY(-50%);
      z-index: 10;
    }

    .preview-info {
      position: absolute;
      top: 50%;
      left: 140px;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .preview-info .contact-name {
      margin-top: 0;
      font-size: 16px;
    }

    .preview-info .contact-company {
      font-size: 10px;
    }

    .preview-info .contact-title {
      font-size: 10px;
    }

    .photo {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 3px solid var(--md-sys-color-primary);
      object-fit: cover;
      background: var(--md-sys-color-surface-variant);
    }

    .photo-placeholder {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 3px solid var(--md-sys-color-primary);
      background: var(--md-sys-color-surface-variant);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .photo-placeholder svg {
      width: 48px;
      height: 48px;
      color: var(--md-sys-color-outline);
    }

    .contact-name {
      font-size: 18px;
      font-weight: 500;
      text-align: center;
      margin-top: 30px;
      color: rgba(255, 255, 255, 0.95);
      letter-spacing: 0.5px;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
    }

    .contact-company {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.7);
      letter-spacing: 1px;
      text-transform: uppercase;
      font-weight: 400;
    }

    .contact-title {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.6);
      font-weight: 300;
    }

    .bg-white .contact-name { color: #1a1a1a; text-shadow: none; }
    .bg-white .contact-company { color: #666; }
    .bg-white .contact-title { color: #888; }

    .contact-info {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px;
      background: var(--md-sys-color-surface-variant);
      border-radius: var(--radius-btn);
      text-decoration: none;
      color: var(--md-sys-color-on-surface);
      transition: var(--transition);
    }

    .contact-item:hover {
      background: var(--md-sys-color-outline);
      color: var(--md-sys-color-on-primary);
    }

    .contact-item svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    .contact-item span {
      font-size: 14px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .social-links {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .social-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      background: var(--md-sys-color-surface-variant);
      color: var(--md-sys-color-on-surface);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
      text-decoration: none;
    }

    .social-btn:hover {
      background: var(--md-sys-color-primary);
      color: var(--md-sys-color-on-primary);
    }

    .social-btn svg {
      width: 18px;
      height: 18px;
    }

    .action-buttons {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: var(--radius-btn);
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: var(--transition);
    }

    .btn-primary {
      background: var(--md-sys-color-primary);
      color: var(--md-sys-color-on-primary);
    }

    .btn-primary:hover {
      background: var(--md-sys-color-secondary);
    }

    .btn-secondary {
      background: var(--md-sys-color-surface-variant);
      color: var(--md-sys-color-on-surface);
    }

    .btn-secondary:hover {
      background: var(--md-sys-color-outline);
      color: var(--md-sys-color-on-primary);
    }

    .btn svg {
      width: 18px;
      height: 18px;
    }

    .edit-form {
      display: none;
      padding: 24px;
      flex-direction: column;
      gap: 16px;
    }

    .edit-form.active {
      display: flex;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--md-sys-color-on-surface-variant);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-input {
      padding: 14px 16px;
      border: 1px solid var(--md-sys-color-outline);
      border-radius: var(--radius-btn);
      font-family: inherit;
      font-size: 14px;
      background: var(--md-sys-color-surface);
      color: var(--md-sys-color-on-surface);
      transition: var(--transition);
    }

    .form-input:focus {
      outline: none;
      border-color: var(--md-sys-color-primary);
    }

    .bg-picker {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .bg-option {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 8px;
      border: 2px solid transparent;
      cursor: pointer;
      transition: var(--transition);
    }

    .bg-option.selected {
      border-color: var(--md-sys-color-primary);
    }

    .photo-upload {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .photo-preview {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      background: var(--md-sys-color-surface-variant);
    }

    .photo-input {
      display: none;
    }

    .photo-label {
      padding: 10px 20px;
      background: var(--md-sys-color-surface-variant);
      border-radius: var(--radius-btn);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
    }

    .photo-label:hover {
      background: var(--md-sys-color-outline);
      color: var(--md-sys-color-on-primary);
    }

    .qr-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .qr-modal.active {
      display: flex;
    }

    .qr-content {
      background: var(--md-sys-color-surface);
      border-radius: var(--radius-card);
      padding: 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      max-width: 340px;
      width: 100%;
    }

    .qr-title {
      font-size: 18px;
      font-weight: 600;
    }

    #qr-code {
      background: white;
      padding: 16px;
      border-radius: 8px;
    }

    #qr-code canvas {
      display: block;
    }

    .qr-close {
      padding: 12px 32px;
      background: var(--md-sys-color-primary);
      color: var(--md-sys-color-on-primary);
      border: none;
      border-radius: var(--radius-btn);
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }

    .card-display {
      display: none;
    }

    .card-display.active {
      display: block;
    }

    .empty-state {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      gap: 16px;
      text-align: center;
    }

    .empty-state.active {
      display: flex;
    }

    .empty-icon {
      width: 64px;
      height: 64px;
      color: var(--md-sys-color-outline);
    }

    .empty-text {
      font-size: 16px;
      color: var(--md-sys-color-on-surface-variant);
    }

    .hidden {
      display: none !important;
    }

    @media (min-width: 420px) {
      body {
        padding: 48px 24px;
      }
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode/1.5.1/qrcode.min.js"></script>
</head>
<body>
  <header class="app-header">
    <h1 class="app-title">Tarjeta Digital</h1>
    <div class="mode-toggle">
      <button class="mode-btn active" data-mode="view">Ver</button>
      <button class="mode-btn" data-mode="edit">Editar</button>
    </div>
  </header>

  <main class="card" id="card">
    <div class="empty-state" id="empty-state">
      <svg class="empty-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
      </svg>
      <p class="empty-text">Crea tu tarjeta digital</p>
      <button class="btn btn-primary" id="create-card-btn">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
        </svg>
        Crear Tarjeta
      </button>
    </div>

    <div class="card-display" id="card-display">
      <div class="card-preview" id="card-preview">
        <div class="photo-container">
          <div class="photo-placeholder" id="photo-placeholder">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
            </svg>
          </div>
          <img class="photo" id="card-photo" src="" alt="Foto" style="display: none;">
        </div>
        <div class="preview-info">
          <h2 class="contact-name" id="card-name">Nombre</h2>
          <p class="contact-company" id="card-company">Empresa</p>
          <p class="contact-title" id="card-title">Título</p>
        </div>
      </div>
      <div class="card-content">
        <div class="contact-info" id="contact-info">
        </div>

        <div class="social-links" id="social-links">
        </div>

        <div class="action-buttons">
          <button class="btn btn-primary" id="save-contact-btn">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/>
            </svg>
            Guardar Contacto
          </button>
          <button class="btn btn-secondary" id="show-qr-btn">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"/>
            </svg>
            Mostrar QR
          </button>
          <button class="btn btn-secondary" id="share-html-btn">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/>
            </svg>
            Compartir HTML
          </button>
        </div>
      </div>
    </div>

    <form class="edit-form" id="edit-form">
      <div class="form-group">
        <label class="form-label">Foto</label>
        <div class="photo-upload">
          <img class="photo-preview" id="photo-preview" src="" alt="Preview" style="display: none;">
          <input type="file" class="photo-input" id="photo-input" accept="image/*">
          <label class="photo-label" for="photo-input">Seleccionar Foto</label>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Nombre *</label>
        <input type="text" class="form-input" id="input-name" placeholder="Tu nombre" required>
      </div>

      <div class="form-group">
        <label class="form-label">Título / Profesión</label>
        <input type="text" class="form-input" id="input-title" placeholder="Ej. Desarrollador">
      </div>

      <div class="form-group">
        <label class="form-label">Teléfono</label>
        <input type="tel" class="form-input" id="input-phone" placeholder="+34 600 000 000">
      </div>

      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-input" id="input-email" placeholder="email@ejemplo.com">
      </div>

      <div class="form-group">
        <label class="form-label">Sitio Web</label>
        <input type="url" class="form-input" id="input-website" placeholder="https://tusitio.com">
      </div>

      <div class="form-group">
        <label class="form-label">Empresa</label>
        <input type="text" class="form-input" id="input-company" placeholder="Nombre de empresa">
      </div>

      <div class="form-group">
        <label class="form-label">Fondo</label>
        <div class="bg-picker" id="bg-picker">
          <div class="bg-option bg-lunar" data-bg="lunar"></div>
          <div class="bg-option bg-sunset" data-bg="sunset"></div>
          <div class="bg-option bg-forest" data-bg="forest"></div>
          <div class="bg-option bg-ocean" data-bg="ocean"></div>
          <div class="bg-option bg-rose" data-bg="rose"></div>
          <div class="bg-option bg-slate" data-bg="slate"></div>
          <div class="bg-option bg-sand" data-bg="sand"></div>
          <div class="bg-option bg-white" data-bg="white"></div>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">WhatsApp</label>
        <input type="url" class="form-input" id="input-whatsapp" placeholder="https://wa.me/...">
      </div>

      <div class="form-group">
        <label class="form-label">Instagram</label>
        <input type="url" class="form-input" id="input-instagram" placeholder="https://instagram.com/...">
      </div>

      <div class="form-group">
        <label class="form-label">LinkedIn</label>
        <input type="url" class="form-input" id="input-linkedin" placeholder="https://linkedin.com/in/...">
      </div>

      <div class="form-group">
        <label class="form-label">Twitter/X</label>
        <input type="url" class="form-input" id="input-twitter" placeholder="https://x.com/...">
      </div>

      <div class="form-group">
        <label class="form-label">GitHub</label>
        <input type="url" class="form-input" id="input-github" placeholder="https://github.com/...">
      </div>

      <div class="form-group">
        <label class="form-label">Telegram</label>
        <input type="url" class="form-input" id="input-telegram" placeholder="https://t.me/...">
      </div>

      <div class="action-buttons">
        <button type="submit" class="btn btn-primary">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
          </svg>
          Guardar
        </button>
        <button type="button" class="btn btn-secondary" id="cancel-edit-btn">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
          Cancelar
        </button>
      </div>
    </form>
  </main>

  <div class="qr-modal" id="qr-modal">
    <div class="qr-content">
      <h3 class="qr-title">Escanea para guardar</h3>
      <div id="qr-code"></div>
      <button class="qr-close" id="qr-close">Cerrar</button>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'digital_card_data';
    let cardData = {
      name: '',
      title: '',
      phone: '',
      email: '',
      website: '',
      company: '',
      photo: '',
      background: 'lunar',
      whatsapp: '',
      instagram: '',
      linkedin: '',
      twitter: '',
      github: '',
      telegram: ''
    };

    const icons = {
      phone: '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6v1z"/></svg>',
      email: '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>',
      website: '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"/></svg>',
      whatsapp: '<svg fill="currentColor" viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/></svg>',
      instagram: '<svg fill="currentColor" viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.069-4.85.069-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>',
      linkedin: '<svg fill="currentColor" viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>',
      twitter: '<svg fill="currentColor" viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>',
      github: '<svg fill="currentColor" viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .315.241.69.794.577 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>',
      telegram: '<svg fill="currentColor" viewBox="0 0 24 24"><path d="M20.665 3.717l-17.73 6.837c-1.21.486-1.203 1.161-.222 1.462l4.552 1.42 10.532-6.645c.498-.303.953-.14.579.192l-8.533 7.701h-.002l.002.001l-.314 4.692c.46 0 .663-.211.921-.46l2.211-2.15 4.599 3.397c.848.467 1.457.227 1.668-.785l3.019-14.228c.309-1.239-.473-1.8-1.282-1.434z"/></svg>'
    };

    function init() {
      loadData();
      setupEventListeners();
      render();
    }

    function loadData() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        try {
          cardData = { ...cardData, ...JSON.parse(saved) };
        } catch (e) {}
      }
    }

    function saveData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(cardData));
    }

    function setupEventListeners() {
      document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.addEventListener('click', () => switchMode(btn.dataset.mode));
      });

      document.getElementById('create-card-btn').addEventListener('click', () => switchMode('edit'));
      document.getElementById('cancel-edit-btn').addEventListener('click', () => {
        if (cardData.name) switchMode('view');
        else switchMode('edit');
      });

      document.querySelectorAll('.bg-option').forEach(opt => {
        opt.addEventListener('click', () => {
          document.querySelectorAll('.bg-option').forEach(o => o.classList.remove('selected'));
          opt.classList.add('selected');
          cardData.background = opt.dataset.bg;
        });
      });

      document.getElementById('photo-input').addEventListener('change', handlePhotoUpload);

      document.getElementById('edit-form').addEventListener('submit', handleSave);

      document.getElementById('save-contact-btn').addEventListener('click', downloadVCard);
      document.getElementById('show-qr-btn').addEventListener('click', showQR);
      document.getElementById('share-html-btn').addEventListener('click', shareAsHTML);
      document.getElementById('qr-close').addEventListener('click', () => {
        document.getElementById('qr-modal').classList.remove('active');
      });
      document.getElementById('qr-modal').addEventListener('click', (e) => {
        if (e.target === document.getElementById('qr-modal')) {
          document.getElementById('qr-modal').classList.remove('active');
        }
      });
    }

    function switchMode(mode) {
      document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.mode === mode);
      });

      const display = document.getElementById('card-display');
      const form = document.getElementById('edit-form');
      const empty = document.getElementById('empty-state');

      if (mode === 'edit') {
        display.classList.remove('active');
        form.classList.add('active');
        empty.classList.remove('active');
        populateForm();
      } else {
        if (cardData.name) {
          form.classList.remove('active');
          display.classList.add('active');
          empty.classList.remove('active');
          renderCard();
        } else {
          form.classList.remove('active');
          display.classList.remove('active');
          empty.classList.add('active');
        }
      }
    }

    function populateForm() {
      document.getElementById('input-name').value = cardData.name || '';
      document.getElementById('input-title').value = cardData.title || '';
      document.getElementById('input-phone').value = cardData.phone || '';
      document.getElementById('input-email').value = cardData.email || '';
      document.getElementById('input-website').value = cardData.website || '';
      document.getElementById('input-company').value = cardData.company || '';
      document.getElementById('input-whatsapp').value = cardData.whatsapp || '';
      document.getElementById('input-instagram').value = cardData.instagram || '';
      document.getElementById('input-linkedin').value = cardData.linkedin || '';
      document.getElementById('input-twitter').value = cardData.twitter || '';
      document.getElementById('input-github').value = cardData.github || '';
      document.getElementById('input-telegram').value = cardData.telegram || '';

      document.querySelectorAll('.bg-option').forEach(opt => {
        opt.classList.toggle('selected', opt.dataset.bg === cardData.background);
      });

      const photoPreview = document.getElementById('photo-preview');
      if (cardData.photo) {
        photoPreview.src = cardData.photo;
        photoPreview.style.display = 'block';
      } else {
        photoPreview.style.display = 'none';
      }
    }

    function handlePhotoUpload(e) {
      const file = e.target.files[0];
      if (!file) return;

      if (file.size > 500 * 1024) {
        alert('La foto debe ser menor a 500KB');
        return;
      }

      const reader = new FileReader();
      reader.onload = (ev) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          const maxSize = 200;
          let size = Math.min(img.width, img.height);
          const x = (img.width - size) / 2;
          const y = (img.height - size) / 2;

          canvas.width = maxSize;
          canvas.height = maxSize;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, x, y, size, size, 0, 0, maxSize, maxSize);

          cardData.photo = canvas.toDataURL('image/jpeg', 0.7);
          const preview = document.getElementById('photo-preview');
          preview.src = cardData.photo;
          preview.style.display = 'block';
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    }

    function handleSave(e) {
      e.preventDefault();

      const name = document.getElementById('input-name').value.trim();
      if (!name) {
        alert('Por favor ingresa tu nombre');
        return;
      }

      cardData.name = name;
      cardData.title = document.getElementById('input-title').value.trim();
      cardData.phone = document.getElementById('input-phone').value.trim();
      cardData.email = document.getElementById('input-email').value.trim();
      cardData.website = document.getElementById('input-website').value.trim();
      cardData.company = document.getElementById('input-company').value.trim();
      cardData.background = document.querySelector('.bg-option.selected')?.dataset.bg || 'lunar';
      cardData.whatsapp = document.getElementById('input-whatsapp').value.trim();
      cardData.instagram = document.getElementById('input-instagram').value.trim();
      cardData.linkedin = document.getElementById('input-linkedin').value.trim();
      cardData.twitter = document.getElementById('input-twitter').value.trim();
      cardData.github = document.getElementById('input-github').value.trim();
      cardData.telegram = document.getElementById('input-telegram').value.trim();

      saveData();
      switchMode('view');
      renderCard();
    }

    function render() {
      if (cardData.name) {
        switchMode('view');
      } else {
        switchMode('edit');
      }
    }

    function renderCard() {
      const preview = document.getElementById('card-preview');
      preview.className = 'card-preview bg-' + cardData.background;

      const photo = document.getElementById('card-photo');
      const placeholder = document.getElementById('photo-placeholder');
      if (cardData.photo) {
        photo.src = cardData.photo;
        photo.style.display = 'block';
        placeholder.style.display = 'none';
      } else {
        photo.style.display = 'none';
        placeholder.style.display = 'flex';
      }

      document.getElementById('card-name').textContent = cardData.name;
      document.getElementById('card-company').textContent = cardData.company || '';
      document.getElementById('card-title').textContent = cardData.title || '';

      const contactInfo = document.getElementById('contact-info');
      contactInfo.innerHTML = '';

      if (cardData.phone) {
        contactInfo.innerHTML += `<a href="tel:${cardData.phone}" class="contact-item">${icons.phone}<span>${cardData.phone}</span></a>`;
      }
      if (cardData.email) {
        contactInfo.innerHTML += `<a href="mailto:${cardData.email}" class="contact-item">${icons.email}<span>${cardData.email}</span></a>`;
      }
      if (cardData.website) {
        contactInfo.innerHTML += `<a href="${cardData.website}" target="_blank" class="contact-item">${icons.website}<span>${cardData.website.replace(/^https?:\/\//, '')}</span></a>`;
      }

      const socialLinks = document.getElementById('social-links');
      socialLinks.innerHTML = '';

      const socials = [
        { key: 'whatsapp', icon: icons.whatsapp },
        { key: 'instagram', icon: icons.instagram },
        { key: 'linkedin', icon: icons.linkedin },
        { key: 'twitter', icon: icons.twitter },
        { key: 'github', icon: icons.github },
        { key: 'telegram', icon: icons.telegram }
      ];

      socials.forEach(s => {
        if (cardData[s.key]) {
          socialLinks.innerHTML += `<a href="${cardData[s.key]}" target="_blank" class="social-btn" title="${s.key}">${s.icon}</a>`;
        }
      });
    }

    function generateVCard() {
      let vcard = 'BEGIN:VCARD\nVERSION:3.0\n';
      vcard += `FN:${cardData.name}\n`;
      if (cardData.title) vcard += `TITLE:${cardData.title}\n`;
      if (cardData.company) vcard += `ORG:${cardData.company}\n`;
      if (cardData.phone) vcard += `TEL:${cardData.phone}\n`;
      if (cardData.email) vcard += `EMAIL:${cardData.email}\n`;
      if (cardData.website) vcard += `URL:${cardData.website}\n`;
      if (cardData.whatsapp) vcard += `URL;type=WhatsApp:${cardData.whatsapp}\n`;
      if (cardData.instagram) vcard += `URL;type=Instagram:${cardData.instagram}\n`;
      if (cardData.linkedin) vcard += `URL;type=LinkedIn:${cardData.linkedin}\n`;
      if (cardData.twitter) vcard += `URL;type=Twitter:${cardData.twitter}\n`;
      if (cardData.github) vcard += `URL;type=GitHub:${cardData.github}\n`;
      if (cardData.telegram) vcard += `URL;type=Telegram:${cardData.telegram}\n`;
      vcard += 'END:VCARD';
      return vcard;
    }

    function downloadVCard() {
      const vcard = generateVCard();
      const blob = new Blob([vcard], { type: 'text/vcard' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `${cardData.name.replace(/\s+/g, '_')}.vcf`;
      a.click();
      URL.revokeObjectURL(url);
    }

    function showQR() {
      const vcard = generateVCard();
      const qrContainer = document.getElementById('qr-code');
      qrContainer.innerHTML = '';

      if (!window.QRCode) {
        console.error('QRCode no cargado');
        return;
      }

      QRCode.toCanvas(vcard, { width: 200, margin: 1 }, (err, canvas) => {
        if (err) {
          console.error(err);
          return;
        }
        qrContainer.appendChild(canvas);
      });

      document.getElementById('qr-modal').classList.add('active');
    }

    function shareAsHTML() {
      var n = cardData.name || 'Contacto';
      var fileName = n.replace(/\s+/g, '_') + '.html';
      var bg = getBgColor(cardData.background);
      var grad = getBgGradient(cardData.background);
      
      var html = [
        '<!DOCTYPE html>',
        '<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>' + n + '</title>',
        '<link href="https://fonts.googleapis.com/css2?family=Outfit&display=swap" rel="stylesheet">',
        '<style>',
        '*{margin:0;padding:0}',
        'body{font-family:Outfit,sans-serif;background:' + bg + ';min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}',
        '.c{max-width:360px;background:#FAFDFD;border-radius:16px;padding:20px;position:relative}',
        '.ph{height:80px;background:linear-gradient(135deg,' + grad + ');margin:-20px -20px 0 -20px;border-radius:16px 16px 0 0}',
        '.pho{width:90px;height:90px;border-radius:50%;border:3px solid #1C4B5E;object-fit:cover;position:absolute;left:50%;top:45px;transform:translateX(-50%);background:#DBE4E6}',
        '.nm{text-align:center;font-size:20px;font-weight:600;margin-top:50px}',
        '.tl{text-align:center;font-size:13px;color:#666;margin-bottom:12px}',
        '.info{display:flex;flex-direction:column;gap:6px}',
        '.info a{display:block;padding:8px 12px;background:#DBE4E6;border-radius:8px;text-decoration:none;color:#191C1D}',
        '.soc{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:12px 0}',
        '.soc a{width:36px;height:36px;border-radius:50%;background:#DBE4E6;display:flex;align-items:center;justify-content:center;color:#191C1D;text-decoration:none}',
        '.act{margin-top:12px}',
        '.act button{width:100%;padding:12px;background:#1C4B5E;color:#FFF;border:none;border-radius:8px;font-size:13px;font-weight:500}',
        '</style></head><body>',
        '<div class="c"><div class="ph">',
        cardData.photo ? '<img class="pho" src="' + cardData.photo + '">' : '',
        '</div><div class="nm">' + n + '</div>',
        cardData.title ? '<div class="tl">' + cardData.title + '</div>' : '',
        '<div class="info">',
      ];
      
      if (cardData.phone) html.push('<a href="tel:' + cardData.phone + '">' + cardData.phone + '</a>');
      if (cardData.email) html.push('<a href="mailto:' + cardData.email + '">' + cardData.email + '</a>');
      if (cardData.website) html.push('<a href="' + cardData.website + '" target="_blank">' + cardData.website + '</a>');
      html.push('</div><div class="soc">');
      
      var socials = [['whatsapp','WA'],['instagram','IG'],['linkedin','LI'],['twitter','X'],['github','GH'],['telegram','TG']];
      for (var i = 0; i < socials.length; i++) {
        if (cardData[socials[i][0]]) {
          html.push('<a href="' + cardData[socials[i][0]] + '" target="_blank">' + socials[i][1] + '</a>');
        }
      }
      html.push('</div>');
      
      if (cardData.phone) {
        html.push('<div class="act"><button onclick="saveVcf()">Guardar Contacto</button></div>');
        html.push('<script>function saveVcf(){var d="FN:' + n + '";');
        if (cardData.phone) html.push('d+="\\nTEL:' + cardData.phone + '";');
        html.push('var b=new Blob([d],{type:"text/vcard"});var u=URL.createObjectURL(b);var a=document.createElement("a");a.href=u;a.download="' + fileName.replace('.html','.vcf') + '";a.click()}</'+'script>');
      }
      
      html.push('</div></body></html>');
      
      var blob = new Blob([html.join('\n')], { type: 'text/html' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = fileName;
      a.click();
      URL.revokeObjectURL(url);
    }

    function getBgColor(bg) {
      var colors = {
        lunar: '#0D1B2A', sunset: '#2D1B2E', forest: '#1A2F1A',
        ocean: '#0A192F', rose: '#2D2225', slate: '#1E2D2F',
        sand: '#2D2720', white: '#FFFFFF'
      };
      return colors[bg] || colors.lunar;
    }

    function getBgGradient(bg) {
      const gradients = {
        lunar: '#0D1B2A,#1B263B', sunset: '#2D1B2E,#662D4B',
        forest: '#1A2F1A,#2D4A2D', ocean: '#0A192F,#193853',
        rose: '#2D2225,#4A383D', slate: '#1E2D2F,#2F3D40',
        sand: '#2D2720,#4A4035', white: '#FFFFFF,#FFFFFF'
      };
      return gradients[bg] || gradients.lunar;
    }

    init();
  </script>
</body>
</html>
